name: Deploy to Google Cloud

on:
  push:
    branches:
      - main

jobs:
  # ── Deploy backend to Cloud Run ──────────────────────────────────────────────
  deploy-backend:
    name: Backend → Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/fixtrace-backend:${{ github.sha }} \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/fixtrace-backend:latest \
            ./backend

      - name: Push image to Container Registry
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/fixtrace-backend:${{ github.sha }}
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/fixtrace-backend:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy fixtrace-backend \
            --image=gcr.io/${{ secrets.GCP_PROJECT_ID }}/fixtrace-backend:${{ github.sha }} \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=1Gi \
            --cpu=1 \
            --timeout=300 \
            --set-env-vars="GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }},GOOGLE_CLOUD_LOCATION=us-central1,GCS_BUCKET_NAME=fixtrace-uploads-${{ secrets.GCP_PROJECT_ID }},GOOGLE_GENAI_USE_VERTEXAI=true"

  # ── Deploy frontend to Firebase Hosting ─────────────────────────────────────
  deploy-frontend:
    name: Frontend → Firebase Hosting
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Debug – verify Tailwind setup
        run: |
          echo "=== Node/npm versions ==="
          node --version
          npm --version
          echo "=== Check @tailwindcss/oxide ==="
          node -e "try { require('@tailwindcss/oxide'); console.log('oxide: OK') } catch(e) { console.error('oxide FAILED:', e.message) }"
          echo "=== Check @tailwindcss/postcss ==="
          node -e "const p = require('@tailwindcss/postcss'); console.log('postcss plugin:', typeof p, p.postcss)"
          echo "=== PostCSS config ==="
          cat postcss.config.json
          echo ""
          echo "=== styles.css first 10 lines ==="
          head -10 src/styles.css
          echo "=== Source files count ==="
          find src/app -name '*.ts' | wc -l
          echo "TS files in src/app/"
          find src/app -name '*.html' | wc -l
          echo "HTML files in src/app/"
        working-directory: frontend

      - name: Inject backend URL into production config
        run: |
          sed -i "s|apiUrl: '.*'|apiUrl: '${{ secrets.BACKEND_URL }}'|" \
            src/environments/environment.prod.ts
        working-directory: frontend

      - name: Build Angular app
        run: npm run build
        working-directory: frontend

      - name: Debug – verify build output
        run: |
          echo "=== Build output ==="
          ls -la dist/frontend/browser/
          CSS_FILE=$(ls dist/frontend/browser/styles-*.css 2>/dev/null || echo 'NOT FOUND')
          echo "CSS file: $CSS_FILE"
          if [ -f "$CSS_FILE" ]; then
            SIZE=$(wc -c < "$CSS_FILE")
            echo "CSS size: $SIZE bytes"
            echo "Contains @layer: $(grep -c '@layer' "$CSS_FILE" || echo 0)"
            echo "Contains .flex: $(grep -c '\.flex' "$CSS_FILE" || echo 0)"
            echo "Contains bg-base: $(grep -c 'bg-base' "$CSS_FILE" || echo 0)"
            echo "Contains .btn: $(grep -c '\.btn' "$CSS_FILE" || echo 0)"
            echo "First 300 chars:"
            head -c 300 "$CSS_FILE"
            echo ""
            # Fail the build if CSS is suspiciously small (Tailwind not working)
            if [ "$SIZE" -lt 50000 ]; then
              echo "::error::CSS file is only $SIZE bytes — Tailwind CSS likely failed to generate utilities!"
              echo "Expected >80KB with Tailwind + DaisyUI utilities"
              exit 1
            fi
          else
            echo "::error::No styles CSS file found in build output!"
            exit 1
          fi
        working-directory: frontend

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FIXTRACE_HACKATHON }}
          channelId: live
          projectId: fixtrace-hackathon
